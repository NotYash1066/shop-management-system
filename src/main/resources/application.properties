spring.application.name=shop-management-system
# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/shop_management_system}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:2000}
spring.datasource.hikari.max-lifetime=${DB_CONNECTION_MAX_LIFETIME_MS:1800000}

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis
spring.cache.redis.cache-null-values=false

# JWT Configuration
app.jwtSecret=${APP_JWT_SECRET:WyJhbGciOiJIUzUxMiJ9eyJzdWIiOiJzaG9wLW1hbmFnZW1lbnQtc3lzdGVtIiwiY29udGV4dCI6InByb2R1Y3Rpb24ifQ==}
app.jwtExpirationMs=86400000
app.async.stock-reconciliation.core-pool-size=${ASYNC_STOCK_CORE_POOL_SIZE:8}
app.async.stock-reconciliation.max-pool-size=${ASYNC_STOCK_MAX_POOL_SIZE:32}
app.async.stock-reconciliation.queue-capacity=${ASYNC_STOCK_QUEUE_CAPACITY:500}
spring.main.allow-bean-definition-overriding=true
spring.main.allow-circular-references=true
