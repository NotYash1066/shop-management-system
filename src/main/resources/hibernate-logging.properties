# Hibernate/JPA SQL Logging Configuration
# Add to application.properties or use as reference

# Log SQL statements (basic)
spring.jpa.show-sql=true

# Format SQL output for readability
spring.jpa.properties.hibernate.format_sql=true

# Log parameter values (be careful with sensitive data)
spring.jpa.properties.hibernate.use_sql_comments=true

# Log execution time for queries
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.stat=DEBUG

# Alternative: Log to file for analysis
# logging.file.name=logs/hibernate-sql.log

# For production benchmarking, consider:
# - log_min_duration_statement=0 in PostgreSQL
# - PostgreSQL pg_stat_statements extension
# - APM tools like Spring Boot Actuator + Micrometer